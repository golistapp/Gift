    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #07040a; color: #fff; margin: 0; overflow-x: hidden;}
        
        .form-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            position: relative;
        }

        /* Premium Minimal Glass Card */
        .lead-card {
            background: rgba(15, 10, 20, 0.65);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(212, 175, 55, 0.15); /* Very subtle Gold Border */
            box-shadow: 0 25px 50px rgba(0,0,0,0.5), inset 0 0 20px rgba(255,255,255,0.02);
            border-radius: 24px;
            padding: 55px 45px; /* Increased padding for breathing room */
            max-width: 460px;
            width: 100%;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        /* Progress Bar - Thin & Elegant */
        .progress-container { margin-bottom: 35px; }
        .progress-text { font-size: 0.75rem; color: #D4AF37; font-weight: 500; text-transform: uppercase; letter-spacing: 2px; display: block; margin-bottom: 12px; opacity: 0.9; }
        .progress-track { width: 100%; height: 2px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
        .progress-fill { width: 33%; height: 100%; background: linear-gradient(90deg, #D4AF37, #ff4da6); border-radius: 2px; transition: width 0.5s ease; }

        /* Headings - Calm & Clear */
        .romantic-heading {
            font-family: 'Playfair Display', serif;
            font-size: 2.1rem;
            color: #fff;
            margin-bottom: 8px;
            line-height: 1.2;
            text-shadow: 0 2px 10px rgba(255, 77, 166, 0.1);
        }
        .section-subtext { color: #bbb; font-size: 0.95rem; margin-bottom: 12px; font-weight: 300; }

        /* Trust Note - Single Line */
        .trust-simple {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 35px;
            font-weight: 300;
        }

        /* Inputs - Clean Style */
        .form-group { margin-bottom: 24px; text-align: left; position: relative; }
        .input-icon-wrapper { position: relative; display: flex; align-items: center; }
        .input-icon { position: absolute; left: 18px; font-size: 1.1rem; opacity: 0.5; pointer-events: none; transition: 0.3s; }
        
        .form-input {
            width: 100%;
            padding: 16px 20px 16px 50px;
            background: rgba(255, 255, 255, 0.03); /* Dark glass */
            border: 1px solid rgba(255, 255, 255, 0.12); /* Thin border */
            border-radius: 12px;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            font-weight: 300;
            transition: all 0.3s ease;
        }
        .form-input::placeholder { color: #666; font-weight: 300; }
        .form-input:focus {
            outline: none;
            border-color: rgba(255, 77, 166, 0.5);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 12px rgba(255, 77, 166, 0.1); /* Minimal glow */
        }
        .form-input:focus + .input-icon { color: #ff4da6; opacity: 0.8; }

        /* Simplified Important Note */
        .simple-note {
            font-size: 0.8rem;
            color: #777;
            font-weight: 300;
            margin-bottom: 30px;
            text-align: center;
        }

        /* Button - Soft & Minimal */
        .btn-continue {
            background: linear-gradient(135deg, #e94b8c, #c2185b); /* Soft gradient */
            color: #ffffff;
            border: none;
            border-radius: 50px;
            padding: 16px;
            font-size: 1.05rem;
            font-weight: 500;
            font-family: 'Poppins', sans-serif;
            width: 100%;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(233, 75, 140, 0.2); /* Minimal glow */
            transition: all 0.4s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-continue:hover {
            transform: scale(1.02) translateY(-2px); /* Slight scale */
            box-shadow: 0 6px 20px rgba(233, 75, 140, 0.3);
        }

        /* Footer Micro Text */
        .story-begins-text { 
            font-size: 0.8rem; 
            color: #D4AF37; 
            margin-top: 25px; 
            font-style: italic; 
            font-family: 'Playfair Display', serif; 
            opacity: 0.5; /* Low opacity */
        }

        /* Success Message (Cleaned up) */
        .success-message {
            display: none;
            background: rgba(46, 213, 115, 0.05);
            border: 1px solid rgba(46, 213, 115, 0.2);
            color: #2ed573;
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
            font-size: 1rem;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .back-link { display: inline-block; margin-top: 25px; color: #666; font-size: 0.85rem; text-decoration: none; transition: 0.3s; }
        .back-link:hover { color: #fff; }

        /* Mobile specific padding adjustments */
        @media (max-width: 480px) {
            .lead-card { padding: 40px 25px; }
        }

        /* 🔴 NAYA: Floating Back Button */
        .floating-back-btn {
            position: absolute;
            top: 30px;
            left: 30px;
            color: #aaa;
            font-size: 1.2rem;
            text-decoration: none;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            transition: all 0.3s ease;
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        .floating-back-btn:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
            border-color: #D4AF37;
            transform: translateX(-3px);
        }
        @media (max-width: 480px) {
            .floating-back-btn {
                top: 15px;
                left: 15px;
                width: 40px;
                height: 40px;
                font-size: 1rem;
            }
        }

    </style>
</head>
<body class="theme-premium-dark">

    <div class="form-container">
        <div class="hero__background-effects" aria-hidden="true" style="top: 50%; width: 80vw; height: 80vw; opacity: 0.4;"></div>

        <div class="lead-card">
            
            <div class="progress-container">
                <span class="progress-text">Step 1 of 3</span>
                <div class="progress-track"><div class="progress-fill"></div></div>
            </div>

            <h2 class="romantic-heading">Let’s Begin Your Surprise 🎁</h2>
            
            
          
                <p class="simple-note">Keep these details safe 🔐 — they’re the key to your surprise, and the only way to access it again ❤️</p>

            <form id="surprise-lead-form">
                
                <div class="form-group">
                    <div class="input-icon-wrapper">
                        <input type="text" id="user-name" class="form-input" placeholder="Your name" required>
                        <span class="input-icon">👤</span>
                    </div>
                </div>
                
                <div class="form-group">
                    <div class="input-icon-wrapper">
                        <input type="tel" id="user-mobile" class="form-input" placeholder="Mobile number" pattern="[0-9]{10}" title="Enter 10 digit mobile number" required>
                        <span class="input-icon">📱</span>
                    </div>
                </div>
                
                <div class="form-group">
                    <div class="input-icon-wrapper">
                        <input type="email" id="user-email" class="form-input" placeholder="Email address" required>
                        <span class="input-icon">✉️</span>
                    </div>
                </div>

                <div style="display:none !important; visibility:hidden; opacity:0; position:absolute; left:-9999px;">
                    <label for="bot-trap">Do not fill this if you are human</label>
                    <input type="text" id="bot-trap" name="bot-trap" tabindex="-1" autocomplete="off">
                </div>

                <button type="submit" class="btn-continue" id="submit-btn">
                    Continue 💝
                </button>
                
                <p class="story-begins-text">This is where your story begins… ✨</p>
            </form>

            <div id="success-msg" class="success-message">
                <i class="fa-solid fa-check" style="font-size: 2rem; margin-bottom: 10px; display: block;"></i> 
                GiftoraX team will contact you within 24 hours.<br>
Your surprise journey has officially begun ❤️
            </div>
            
            <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left" style="margin-right: 5px;"></i> Back to Home</a>
        </div>
    </div>

    <script src="landing-assets/lead-form.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const inputs = [
                document.getElementById('user-name'),
                document.getElementById('user-mobile'),
                document.getElementById('user-email')
            ];
            const progressFill = document.querySelector('.progress-fill');
            const progressText = document.querySelector('.progress-text');

            function updateProgress() {
                let filledCount = 0;
                
                // Check karte hain kitne boxes bhar gaye hain
                inputs.forEach(input => {
                    if (input && input.value.trim() !== '') {
                        filledCount++;
                    }
                });

                // Progress Bar ka percentage set karna
                let percentage = 10; // Default thoda sa dikhne ke liye
                if (filledCount === 1) percentage = 33;
                if (filledCount === 2) percentage = 66;
                if (filledCount === 3) percentage = 100;

                // Width update karna smooth animation ke sath
                if(progressFill) progressFill.style.width = percentage + '%';

                // Upar ka text bhi smart tareeke se update karna
                if(progressText) {
                    if (filledCount <= 1) progressText.innerText = "Step 1 of 3 - Getting Started";
                    else if (filledCount === 2) progressText.innerText = "Step 2 of 3 - Almost There";
                    else if (filledCount === 3) progressText.innerText = "Step 3 of 3 - Ready to Create! 💝";
                }
            }

            // Jaise hi user kuch type karega, progress bar update hoga
            inputs.forEach(input => {
                if(input) input.addEventListener('input', updateProgress);
            });
            
            // Page load hone par initial state set karna
            updateProgress();
        });
    </script>
</body>
</html>
