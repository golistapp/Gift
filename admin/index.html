<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - QR Memory Gift</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="../global.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="../api/firebase.config.js"></script>
</head>
<body class="admin-theme">

    <nav class="top-nav">
        <div class="nav-logo">
            <i class="fa-solid fa-gift"></i> Memory Gift <span>Admin</span>
        </div>
        <button id="logout-btn" class="logout-btn" style="background: #fee2e2; color: #ef4444; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: 500;"><i class="fa-solid fa-power-off"></i> Logout</button>
    </nav>

    <div class="admin-container">
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon" style="width: 50px; height: 50px; border-radius: 50%; background: #eff6ff; color: #3b82f6; display: flex; align-items: center; justify-content: center; font-size: 20px;"><i class="fa-solid fa-qrcode"></i></div>
                <div class="stat-info">
                    <h3 style="font-size: 13px; color: #64748b; font-weight: 500;">Total Generated</h3>
                    <p id="stat-total" style="font-size: 24px; font-weight: 700; color: #0f172a; margin-top: 5px;">0</p>
                </div>
            </div>
            <div class="stat-card" style="border-left-color: #f59e0b;">
                <div class="stat-icon" style="background: #fffbeb; color: #f59e0b;"><i class="fa-solid fa-hourglass-half"></i></div>
                <div class="stat-info">
                    <h3 style="font-size: 13px; color: #64748b; font-weight: 500;">Pending (Empty)</h3>
                    <p id="stat-empty" style="font-size: 24px; font-weight: 700; color: #0f172a; margin-top: 5px;">0</p>
                </div>
            </div>
            <div class="stat-card" style="border-left-color: #10b981;">
                <div class="stat-icon" style="background: #ecfdf5; color: #10b981;"><i class="fa-solid fa-lock"></i></div>
                <div class="stat-info">
                    <h3 style="font-size: 13px; color: #64748b; font-weight: 500;">Completed (Locked)</h3>
                    <p id="stat-locked" style="font-size: 24px; font-weight: 700; color: #0f172a; margin-top: 5px;">0</p>
                </div>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1.5fr; gap: 30px;" class="dashboard-grid">
            <div class="admin-card">
                <h2 style="font-size: 18px; color: #0f172a; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #e2e8f0;"><i class="fa-solid fa-plus-circle"></i> Create New Order</h2>
                <form id="generate-form">
                    <div class="input-group">
                        <label>Customer Name (Boyfriend)</label>
                        <input type="text" id="customer-name" placeholder="e.g. Rahul Sharma" required>
                    </div>
                    <div class="input-group">
                        <label>Mobile Number (For records)</label>
                        <input type="text" id="customer-mobile" placeholder="e.g. 9876543210" required>
                    </div>
                    <button type="submit" id="generate-btn" class="primary-btn">
                        <i class="fa-solid fa-qrcode"></i> Generate QR & Links
                    </button>
                </form>

                <div id="result-section" class="hidden" style="margin-top: 20px; padding-top: 20px; border-top: 1px dashed #cbd5e1;">
                    <div style="background: #ecfdf5; color: #059669; padding: 10px; border-radius: 6px; text-align: center; margin-bottom: 15px; font-weight: 500;">Memory ID: <strong id="display-id"></strong></div>
                    <div style="display: flex; flex-direction: column; gap: 10px;">
                        <div style="background: #f8fafc; padding: 10px; border-radius: 6px; border: 1px solid #e2e8f0;">
                            <h3 style="font-size: 12px; color: #64748b; margin-bottom: 5px;">Boyfriend Link (Form)</h3>
                            <input type="text" id="form-link" style="width: 100%; padding: 6px; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 11px; margin-bottom: 5px;" readonly>
                            <button class="copy-btn" data-target="form-link" style="width: 100%; padding: 6px; background: #e2e8f0; border: none; border-radius: 4px; font-size: 11px; cursor: pointer;"><i class="fa-regular fa-copy"></i> Copy</button>
                        </div>
                        <div style="background: #f8fafc; padding: 10px; border-radius: 6px; border: 1px solid #e2e8f0;">
                            <h3 style="font-size: 12px; color: #64748b; margin-bottom: 5px;">Girlfriend Link (View)</h3>
                            <input type="text" id="view-link" style="width: 100%; padding: 6px; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 11px; margin-bottom: 5px;" readonly>
                            <button class="copy-btn" data-target="view-link" style="width: 100%; padding: 6px; background: #e2e8f0; border: none; border-radius: 4px; font-size: 11px; cursor: pointer;"><i class="fa-regular fa-copy"></i> Copy</button>
                        </div>
                    </div>
                    <div id="qrcode-container" style="margin-top: 15px; display: flex; justify-content: center; padding: 15px; background: #fff; border: 1px dashed #cbd5e1; border-radius: 8px;"></div>
                </div>
            </div>

            <div class="admin-card">
                <h2 style="font-size: 18px; color: #0f172a; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #e2e8f0;"><i class="fa-solid fa-database"></i> Recent Orders</h2>
                <div style="overflow-x: auto;">
                    <table class="data-table">
                        <thead>
                            <tr style="background: #f8fafc;">
                                <th>ID & Name</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="orders-tbody">
                            <tr><td colspan="3" style="text-align:center;">Loading data...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
