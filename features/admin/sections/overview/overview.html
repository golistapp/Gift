<div class="overview-section fade-in">
    <div class="dashboard-header">
   
        <div class="quick-actions">
            <button class="btn-blue quick-create-btn" onclick="document.getElementById('create-order-sheet').classList.remove('hidden')">
                <i class="fa-solid fa-plus"></i> New Surprise
            </button>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card stat-blue">
            <div class="stat-icon"><i class="fa-solid fa-qrcode"></i></div>
            <div class="stat-info">
                <h3>Total Generated</h3>
                <p id="stat-total">0</p>
            </div>
        </div>
        
        <div class="stat-card stat-green">
            <div class="stat-icon"><i class="fa-solid fa-lock"></i></div>
            <div class="stat-info">
                <h3>Locked & Ready</h3>
                <p id="stat-locked">0</p>
            </div>
        </div>

        <div class="stat-card stat-pink">
            <div class="stat-icon"><i class="fa-solid fa-envelope-open-text"></i></div>
            <div class="stat-info">
                <h3>Gifts Opened</h3>
                <p id="stat-opened">0</p>
            </div>
        </div>

        <div class="stat-card stat-purple">
            <div class="stat-icon"><i class="fa-solid fa-ring"></i></div>
            <div class="stat-info">
                <h3>Proposals Accepted</h3>
                <p id="stat-proposals">0</p>
            </div>
        </div>
    </div>

    <div class="admin-card mt-25">
        <div class="recent-orders-header">
            <h3><i class="fa-solid fa-clock-rotate-left"></i> Recent 5 Orders</h3>
            <button id="view-all-orders-btn" class="view-all-link">View All <i class="fa-solid fa-arrow-right"></i></button>
        </div>
        <div class="table-responsive">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>ID & DATE</th>
                        <th>CUSTOMER</th>
                        <th>STATUS</th>
                        <th>QUICK SHARE</th>
                    </tr>
                </thead>
                <tbody id="recent-orders-tbody">
                    <tr><td colspan="4" style="text-align:center; padding: 20px; color: #64748b;">Loading recent orders...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
