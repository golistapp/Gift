<div class="reviews-section fade-in">
    <div class="admin-card">
        <div class="orders-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px;">
            <div>
                <h2><i class="fa-solid fa-star"></i> Public Reviews</h2>
                <p style="font-size: 13px; color: #64748b; margin-top: 5px;">Manage what users see on the Experience page.</p>
            </div>
            
            <div class="review-filters">
                <button class="filter-tab active" data-status="all">All</button>
                <button class="filter-tab" data-status="pending">Pending</button>
                <button class="filter-tab" data-status="approved">Approved</button>
            </div>
        </div>

        <div class="table-responsive">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>DATE</th>
                        <th>USER</th>
                        <th>REVIEW & RATING</th>
                        <th>STATUS</th>
                        <th>ACTIONS</th>
                    </tr>
                </thead>
                <tbody id="reviews-tbody">
                    <tr><td colspan="5" style="text-align:center; padding: 30px;">Loading reviews...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
