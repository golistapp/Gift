<div class="orders-section fade-in">
    <div class="admin-card">
        <div class="orders-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px;">
            <h2><i class="fa-solid fa-database"></i> Manage Orders</h2>

            <button id="export-csv-btn" class="btn-green" style="width: auto; margin: 0; padding: 10px 15px; font-size: 13px;">
                <i class="fa-solid fa-file-csv"></i> Export CSV
            </button>
        </div>

        <div class="orders-toolbar">
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="search-input" placeholder="Search by ID or Name...">
            </div>

            <div class="filter-group">
                <select id="status-filter" class="elegant-select">
                    <option value="all">All Status</option>
                    <option value="empty">Pending (Empty)</option>
                    <option value="locked">Completed (Locked)</option>
                </select>
            </div>

            <div class="filter-group">
                <select id="date-filter" class="elegant-select">
                    <option value="all">All Time</option>
                    <option value="today">Today</option>
                    <option value="yesterday">Yesterday</option>
                    <option value="week">This Week</option>
                </select>
            </div>
        </div>

        <div class="table-responsive">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>DATE & ID</th>
                        <th>CUSTOMER DETAILS</th>
                        <th>STATUS</th>
                        <th>ACTIONS</th>
                    </tr>
                </thead>
                <tbody id="orders-tbody">
                    <tr><td colspan="4" style="text-align:center; padding: 30px;">Loading data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="reset-modal" class="hidden modal-overlay">
        <div class="admin-card modal-card">
            <button id="close-reset-modal" class="close-modal"><i class="fa-solid fa-xmark"></i></button>
            <h2><i class="fa-solid fa-triangle-exclamation" style="color: #f59e0b;"></i> Advanced Reset</h2>
            <p style="font-size: 14px; margin-bottom: 20px;">Choose what to reset for ID: <strong id="reset-memory-id" style="color: var(--admin-blue);"></strong></p>

            <div class="modal-buttons" style="display: flex; flex-direction: column; gap: 12px;">
                <button id="btn-reset-full" class="btn-red" style="padding: 12px; border: none; border-radius: 8px; cursor: pointer;"><i class="fa-solid fa-trash-can"></i> Full Reset (All Data)</button>
                <button id="btn-reset-text" class="btn-yellow" style="padding: 12px; border: none; border-radius: 8px; cursor: pointer;"><i class="fa-solid fa-comment-slash"></i> Reset Text / Data Only</button>
                <button id="btn-reset-images" class="btn-blue" style="padding: 12px; border: none; border-radius: 8px; cursor: pointer;"><i class="fa-solid fa-image"></i> Reset Images Only</button>
            </div>
        </div>
    </div>

    <div id="hidden-qr-container" style="display: none;"></div>
</div>
