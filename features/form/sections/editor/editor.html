<div id="editor-screen" class="pb-40 fade-in">
    <header class="editor-header">
        <h1>Create Your Surprise ❤️</h1>
        <p>Fill out the details below to lock your gift.</p>
    </header>

    <form id="memory-form">
        <div class="editor-section">
            <h2 class="step-title">1. Basic Details & Vault Lock</h2>
            
            <div class="input-wrapper mb-15">
                <label>Occasion / Headline:</label>
                <select id="occasion-select" class="elegant-input" required>
                    <option value="Happy Birthday">Happy Birthday</option>
                    <option value="Happy Anniversary">Happy Anniversary</option>
                    <option value="Happy Valentine's Day">Happy Valentine's Day</option>
                    <option value="Proposal">Proposal</option>
                </select>
            </div>

            <div class="input-wrapper mb-15">
                <label>Gift Person Name:</label>
                <input type="text" id="gf-name" class="elegant-input" placeholder="e.g. Ananya" required>
            </div>

            <div class="input-wrapper">
                <label>Set Gift Person Date of Birth (Password):</label>
                <div class="passcode-composite">
                    <span id="serial-prefix" class="prefix-box"><i class="fa-solid fa-spinner fa-spin"></i></span>
                    <input type="text" id="passcode-input" class="elegant-input" maxlength="6" placeholder="e.g. 140298" required>
                </div>
            </div>

        </div>

        <div class="editor-section">
            <h2 class="step-title">2. The Main Love Letter</h2>
            
            <div class="letter-toolbar">
                <div class="lang-toggle">
                    <input type="radio" id="lang-en" name="letter-lang" value="en" checked>
                    <label for="lang-en">English</label>
                    <input type="radio" id="lang-hi" name="letter-lang" value="hi">
                    <label for="lang-hi">Hinglish</label>
                </div>
                <button type="button" id="reset-letter-btn" class="btn-reset">
                    <i class="fa-solid fa-rotate-right"></i> Reset
                </button>
            </div>

            <div class="letter-container">
                <div class="letter-greeting" id="dynamic-greeting">Hi [Name] ❤️,</div>
                <textarea id="letter-text" class="letter-textarea" rows="10" placeholder="Write your letter here..." required></textarea>
            </div>
        </div>

        <div class="editor-section">
            <h2 class="step-title">3. Upload 5 Memories</h2>
            <div class="upload-controls mb-15" style="text-align: center;">
                <label for="bulk-upload" class="btn-pink" style="padding: 12px 25px; display: inline-block; cursor: pointer; border-radius: 25px;">
                    <i class="fa-solid fa-images"></i> Select Up To 5 Photos
                </label>
                <input type="file" id="bulk-upload" accept="image/*" multiple hidden>
                <p style="font-size: 12px; color: #666; margin-top: 10px;">Select multiple files at once. You can re-select to change them.</p>
            </div>
            <div class="polaroid-grid" id="image-upload-container">
                </div>
        </div>

        <button type="button" id="preview-gift-btn" class="btn-pink" style="width: 100%; padding: 15px; font-size: 18px; margin-bottom: 15px; background: #f59e0b;">
            <i class="fa-solid fa-eye"></i> Preview Gift
        </button>

        <button type="submit" id="lock-gift-btn" class="btn-pink lock-btn-style" style="width: 100%; padding: 15px; font-size: 18px;">
            <i class="fa-solid fa-lock"></i> Lock Gift & Generate
        </button>
    </form>
</div>
