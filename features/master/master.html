<div class="master-wrapper fade-in">
    <div id="light-burst-overlay" class="hidden"></div>
    <div id="particles-container"></div>

    <div class="master-content">
        <div class="premium-logo-area floating" id="secret-admin-trigger" title="Triple tap for secret access">
            <div class="logo-gold-glow"></div>
            <img src="assets/image/3dlogo.png" alt="GiftoraX 3D Logo" class="custom-3d-logo" onerror="this.style.display='none'; this.nextElementSibling.style.display='inline-block';">
            <i class="fa-solid fa-gift gift-icon-3d fallback-icon" style="display:none;"></i>
            <h1 class="brand-text">Giftora<span class="highlight-x">X</span></h1>
        </div>

        <div class="glass-gift-card" id="master-card">
            <h2 class="romantic-heading">Something special for you ❤️</h2>
            
            <form id="master-login-form">
                <div class="input-section">
                    <div class="split-input-container">
                        <div class="secret-input-wrapper id-box">
                            <span class="static-prefix">GX-</span>
                            <input type="number" id="master-id-input" class="secret-code-input" placeholder="ID" autocomplete="off" maxlength="4" required>
                        </div>
                        <div class="secret-input-wrapper pass-box">
                            <input type="password" id="master-pass-input" class="secret-code-input" placeholder="Password" autocomplete="off" maxlength="6" required>
                        </div>
                    </div>
                    <p id="master-error" class="error-text hidden"><i class="fa-solid fa-circle-exclamation"></i> Incorrect details.</p>
                </div>
                
                <button type="submit" class="btn-gold-glow" id="master-open-btn">
                    Tap to Open <span class="spinning-gift">🎁</span>
                </button>
            </form>

            <div class="minimal-help-links">
                <button type="button" id="btn-forgot-recovery" class="minimal-link">Forgot ID or Password?</button>
            </div>
        </div>
    </div>

    <div class="explore-area">
        <a href="index.html" id="btn-explore" class="minimal-explore-btn">
            Explore More <i class="fa-solid fa-arrow-right"></i>
        </a>
    </div>

    <div id="recovery-modal" class="hidden master-modal-overlay">
        <div class="glass-gift-card modal-card fade-in-scale">
            <button class="close-master-modal" id="close-recovery"><i class="fa-solid fa-xmark"></i></button>
            <h3 style="color: #4a154b; font-family: var(--font-heading); font-size: 26px; margin-bottom: 10px;">Account Recovery</h3>
            <p style="font-size: 13px; color: #666; margin-bottom: 20px;">Verify details to securely receive your ID & Password.</p>
            
            <input type="text" id="rec-primary" class="secret-code-input" placeholder="Registered Email or Mobile No." style="margin-bottom: 10px; text-align: center; height: 50px; background: rgba(255,255,255,0.7); border-radius: 12px; border: 1px solid rgba(255,255,255,0.9);">
            
            <input type="text" id="rec-secondary" class="secret-code-input" placeholder="Name, or Gift ID, or Password" style="margin-bottom: 15px; text-align: center; height: 50px; background: rgba(255,255,255,0.7); border-radius: 12px; border: 1px solid rgba(255,255,255,0.9);">
            
            <button id="btn-recover-secure" class="btn-gold-glow" style="padding: 12px; font-size: 15px; margin-top: 0;">Secure Request <i class="fa-solid fa-shield-halved" style="margin-left: 5px;"></i></button>
            <div id="recovery-result" class="search-result-area"></div>
        </div>
    </div>
</div>
