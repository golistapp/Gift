<div class="chat-app-wrapper" id="gf-chat-wrapper">
    <div class="native-chat-header" id="native-chat-header">
        <div class="chat-header-left">
            <div class="chat-avatar">
                <img src="assets/image/album1.jpg" alt="Profile" id="chat-profile-pic" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                <div class="fallback-avatar" style="display:none;"><i class="fa-solid fa-heart"></i></div>
            </div>
            <div class="chat-user-info">
                <h2 id="chat-user-name">My Love ❤️</h2>
                <span id="live-status">Connecting...</span>
            </div>
        </div>
        <div class="chat-header-right">
            <i class="fa-solid fa-video header-icon"></i>
            <i class="fa-solid fa-phone header-icon"></i>
            <i class="fa-solid fa-ellipsis-vertical header-icon"></i>
        </div>
    </div>

    <audio id="sound-send" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3" preload="auto"></audio>
    <audio id="sound-receive" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3" preload="auto"></audio>

    <div id="scroll-arrows" class="scroll-arrows hidden">
        <button id="scroll-top-btn"><i class="fa-solid fa-angle-up"></i></button>
        <button id="scroll-bottom-btn"><i class="fa-solid fa-angle-down"></i></button>
    </div>

    <div id="chat-messages-area" class="whatsapp-bg">
        <p class="chat-empty-text">Send a message to start the conversation...</p>
    </div>

    <div class="chat-input-wrapper">
        <div id="gf-img-popup" class="img-popup hidden">
            <div class="img-popup-header">Send a Memory <i class="fa-solid fa-xmark" id="gf-close-popup" style="cursor:pointer; padding:5px; font-size:16px;"></i></div>
            <div class="img-grid" id="gf-img-grid"></div>
        </div>

        <div id="reply-preview-box" class="reply-preview-box hidden">
            <div class="reply-content">
                <span id="reply-text-preview"></span>
            </div>
            <i class="fa-solid fa-xmark cancel-reply" id="cancel-reply-btn"></i>
        </div>

        <div class="chat-input-inner">
            <button id="gf-gallery-btn" class="gallery-btn action-btn" disabled><i class="fa-regular fa-image"></i></button>
            <textarea id="live-msg-input" placeholder="Type a message..." class="chat-input-box" rows="1"></textarea>
            <button id="send-msg-btn" class="chat-send-btn"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
        
            <p id="msg-count-display" class="msg-count-display"><i class="fa-solid fa-lock" style="font-size:9px;"></i> End-to-End Encrypted SMS: 0/100 (Total: 0)</p>
    </div>

    <div id="full-image-modal" class="full-image-modal">
        <button id="close-full-image" class="close-full-image"><i class="fa-solid fa-xmark"></i></button>
        <img id="full-image-display" src="" alt="Full Screen Memory">
    </div>
</div>
