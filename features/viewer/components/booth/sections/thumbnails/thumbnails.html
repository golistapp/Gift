<style>
    .booth-thumbnails-container { display: flex; gap: 15px; overflow-x: auto; padding: 10px 5px; width: 100%; scroll-behavior: smooth; }
    .booth-thumbnails-container::-webkit-scrollbar { height: 6px; }
    .booth-thumbnails-container::-webkit-scrollbar-thumb { background: var(--primary-pink); border-radius: 10px; }
    
    .memory-thumb {
        width: 70px;
        height: 70px;
        border-radius: 12px;
        object-fit: cover;
        border: 2px solid white;
        box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        cursor: pointer;
        flex-shrink: 0;
        transition: transform 0.2s, border-color 0.2s;
    }
    .memory-thumb:hover { transform: scale(1.1); border-color: var(--primary-pink); }
</style>

<div id="thumb-strip" class="booth-thumbnails-container fade-in">
    </div>
