<style>
    /* Display Section Scoped CSS */
    .camera-outer-frame {
        padding: 15px;
        background: #fff;
        border-radius: 20px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
        width: 100%;
        transform: rotate(-2deg);
        transition: transform 0.4s ease;
    }
    
    .camera-outer-frame:hover { 
        transform: rotate(0deg) scale(1.02); 
    }

    .camera-box {
        position: relative;
        width: 100%;
        aspect-ratio: 4/3;
        background: #111;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.8);
    }

    #booth-video, #booth-canvas {
        display: none;
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    #booth-placeholder {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: rgba(255, 255, 255, 0.7);
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        width: 100%;
    }

    #booth-placeholder i { 
        font-size: 3.5rem; 
        color: rgba(255, 255, 255, 0.3); 
    }

    /* 📸 DSLR Flash Animation */
    #booth-flash {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background: white;
        opacity: 0;
        pointer-events: none;
        z-index: 50;
    }
    .flash-anim { animation: flashEffect 0.6s ease-out; }
    
    @keyframes flashEffect {
        0% { opacity: 1; }
        100% { opacity: 0; }
    }

    /* ⏲️ 3-2-1 Countdown Animation */
    #booth-countdown {
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        font-size: 6rem;
        color: white;
        font-family: var(--font-heading);
        text-shadow: 0 0 20px rgba(255, 77, 121, 0.9);
        z-index: 40;
        display: none;
    }
    
    .count-anim { animation: popCount 1s ease-in-out; }
    
    @keyframes popCount {
        0% { transform: translate(-50%, -50%) scale(0.3); opacity: 0; }
        50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
        100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
    }
</style>

<div class="camera-outer-frame fade-in">
    <div class="camera-box" id="camera-box">
        <div id="booth-flash"></div>
        <div id="booth-countdown">3</div>
        
        <video id="booth-video" autoplay muted playsinline></video>
        <canvas id="booth-canvas"></canvas>
        
        <div id="booth-placeholder">
            <i class="fa-solid fa-camera-retro"></i>
            <p>Camera inactive.<br>Click Start or Upload Image.</p>
        </div>
    </div>
</div>
