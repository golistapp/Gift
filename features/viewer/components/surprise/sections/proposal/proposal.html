<style>
    /* Enhanced Proposal CSS - Hero Section Match */
    .proposal-section { 
        min-height: 80vh; 
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        justify-content: center; 
        padding: 40px 10px; /* Thoda padding kam kiya taaki width achhi mile */
        text-align: center; 
        overflow: hidden;
    }
    
    /* 🔴 NAYA: Premium Card Look (Exactly matching Hero Section Card) */
    .proposal-card { 
        padding: 45px 20px; 
        border-radius: 24px; 
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.95), rgba(255, 255, 255, 0.75)); 
        border: 1px solid rgba(255, 77, 121, 0.4); /* Hero wala subtle pink border */
        box-shadow: 0 35px 65px rgba(0, 0, 0, 0.12), 0 15px 25px rgba(216, 27, 96, 0.15), inset 0 0 25px rgba(255, 255, 255, 0.8); 
        width: 98%;
        max-width: 580px;
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        gap: 25px; 
        position: relative; 
        backdrop-filter: blur(25px); 
    }
    
    /* Text Styling */
      .script-heading { 
        font-family: var(--font-heading); 
        font-size: clamp(2.5rem, 6vw, 4rem); /* 🔴 Mobile me chota, Desktop me bada */
        background: linear-gradient(to right, #cc0033, #ff1a53);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        font-weight: 700; 
        margin-bottom: 5px; 
        filter: drop-shadow(2px 2px 4px rgba(255, 77, 121, 0.2)); 
        line-height: 1.2;
    }
    .script-heading.accent-pink { 
        font-size: clamp(3rem, 8vw, 4.8rem); /* 🔴 Fluid text */
        animation: heartBeat 1.5s infinite; 
    }

    /* 🔴 NAYA: Emoji Fix (Gradient color emoji par apply na ho) */
    .original-emoji {
        -webkit-text-fill-color: initial;
        display: inline-block;
    }

    .success-subtext { font-family: var(--font-ui); color: #444; font-size: 1.15rem; margin-bottom: 20px; font-weight: 500; }
    
    /* Glowing Circular GIF Container */
    .gif-card { 
        background: #ffffff; border-radius: 50%; padding: 10px; 
        box-shadow: 0 0 25px rgba(255, 77, 121, 0.4), inset 0 0 10px rgba(255, 77, 121, 0.2); 
        display: inline-block; transition: transform 0.3s; 
        border: 4px solid #ff4d79;
        animation: floatGif 3s ease-in-out infinite;
    }
    .main-gif { width: 220px; height: 220px; object-fit: cover; border-radius: 50%; }
    
    @keyframes floatGif { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

    .proposal-buttons { display: flex; gap: 20px; justify-content: center; align-items: center; position: relative; height: 70px; width: 100%; margin-top: 10px;}
    .btn-yes, .btn-no { font-family: var(--font-ui); font-size: 1.2rem; font-weight: 600; padding: 12px 35px; border-radius: 50px; border: none; cursor: pointer; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    
    .btn-no { background: #e2e8f0; color: #64748b; box-shadow: 0 5px 15px rgba(0,0,0,0.05); z-index: 10; transition: transform 0.3s ease-out;}
    
    /* Glowing Pulse on Yes Button */
    .btn-yes { 
        background: linear-gradient(135deg, #ff4d79, #cc0033); color: white; 
        box-shadow: 0 0 20px rgba(255, 77, 121, 0.6); 
        animation: pulseGlowBtn 2s infinite;
        z-index: 5;
    }
    .btn-yes:hover { transform: scale(1.1) translateY(-5px); box-shadow: 0 15px 40px rgba(204, 0, 51, 0.7); }

    @keyframes pulseGlowBtn { 
        0% { box-shadow: 0 0 0 0 rgba(255, 77, 121, 0.6); transform: scale(1); } 
        50% { box-shadow: 0 0 0 15px rgba(255, 77, 121, 0); transform: scale(1.05); } 
        100% { box-shadow: 0 0 0 0 rgba(255, 77, 121, 0); transform: scale(1); } 
    }

    @keyframes heartBeat { 0%, 30%, 60% { transform: scale(1); } 15%, 45% { transform: scale(1.1); } }
    
    /* Shake Animation for No Button */
    .shake-anim { animation: shakeBtn 0.15s ease-in-out; }
    @keyframes shakeBtn { 
        0% { transform: translateX(0); } 
        25% { transform: translateX(-5px) rotate(-5deg); } 
        50% { transform: translateX(5px) rotate(5deg); } 
        75% { transform: translateX(-5px) rotate(-5deg); } 
        100% { transform: translateX(0); } 
    }
</style>

<div class="proposal-section fade-in">
    <div id="proposal-state" class="proposal-card">
        <h2 class="script-heading">Will you be my Valentine<span id="prop-dynamic-name" style="color: #ff1a53; font-size: 2.8rem;"></span>? <span class="original-emoji">🌹</span></h2>
        <div class="gif-card" id="question-gif-card">
            <img src="assets/gif/reaction.gif" alt="Asking Bear" class="main-gif" id="proposal-gif">
        </div>
        <div class="proposal-buttons">
            <button class="btn-no" id="btn-no">No 🥺</button>
            <button class="btn-yes" id="btn-yes">Yes! 💖</button>
        </div>
    </div>

    <div id="success-state" class="proposal-card" style="display: none;">
        <h2 class="script-heading accent-pink"><span class="original-emoji">✨</span> Yayyyyyy! <span class="original-emoji">✨</span></h2>
        <p class="success-subtext" id="success-dynamic-text">"I knew you'd say yes! I love you! 💖"</p>
        <div class="gif-card" style="border: 4px solid #ff1a53;">
            <img src="assets/gif/kiss.gif" alt="Kissing Bears" class="main-gif">
        </div>
    </div>
    
    <audio id="prop-click-sound" src="assets/audio/click.mp3" preload="auto"></audio>
    <audio id="prop-yay-sound" src="assets/audio/magic.mp3" preload="auto"></audio>
</div>
