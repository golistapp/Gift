<style>
    /* Gift Section CSS */
    .final-gift-section { min-height: 70vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px 20px;}
    .script-heading.dark { color: #4a1525; font-family: var(--font-heading); font-size: 3.5rem; margin-bottom: 10px;}
    .click-instruction { color: var(--primary-pink); font-family: var(--font-ui); font-size: 1.1rem; margin-bottom: 40px; font-weight: 500; animation: bounce 2s infinite; }

    /* Minimal Gift Box */
    .minimal-gift-container { cursor: pointer; perspective: 1200px; margin-bottom: 30px; animation: giftSway 4s infinite alternate ease-in-out; }
    .minimal-gift-container.opened-container { animation: none; }
    @keyframes giftSway { 0% { transform: rotate(-2deg); } 100% { transform: rotate(2deg); } }

    .minimal-gift-box { position: relative; width: 140px; height: 120px; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform-style: preserve-3d; }
    .minimal-gift-box:hover { transform: scale(1.08) translateY(-5px); }
    .minimal-gift-body { position: absolute; bottom: 0; width: 100%; height: 100px; background: linear-gradient(135deg, #e60039, #990026); border-radius: 8px; box-shadow: 0 20px 40px rgba(0,0,0,0.25); overflow: hidden; }
    .gift-ribbon-v-body { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 20px; height: 100%; background: linear-gradient(to right, #ffd700, #ffea75, #ffd700); }

    .minimal-gift-lid { position: absolute; top: 0; left: -5%; width: 110%; height: 35px; background: linear-gradient(to bottom, #ff1a53, #cc0033); border-radius: 6px; z-index: 3; box-shadow: 0 10px 20px rgba(0,0,0,0.3); transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; justify-content: center; }
    .gift-ribbon-h { position: absolute; top: 50%; left: 0; transform: translateY(-50%); width: 100%; height: 20px; background: linear-gradient(to bottom, #ffd700, #ffea75, #ffd700); }
    .gift-ribbon-v { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 20px; height: 100%; background: linear-gradient(to right, #ffd700, #ffea75, #ffd700); }

    /* Box Open State */
    .minimal-gift-box.opened .minimal-gift-lid { transform: translateY(-100px) translateX(30px) rotate(20deg); opacity: 0; }
    .minimal-gift-box.opened { animation: giftPop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    @keyframes giftPop { 0% { transform: scale(1); } 40% { transform: scale(0.9) translateY(10px); } 100% { transform: scale(1) translateY(0); } }

    /* Surprise Message */
    .surprise-message { margin-top: 40px; padding: 30px; background: white; border-radius: 20px; box-shadow: 0 20px 50px rgba(255, 77, 121, 0.2); border: 2px solid var(--soft-pink); opacity: 0; transform: translateY(40px) scale(0.9); transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); max-width: 500px; }
    .surprise-message.show { opacity: 1; transform: translateY(0) scale(1); }
    .surprise-message h3 { font-family: var(--font-heading); font-size: 3rem; color: var(--deep-red); margin-bottom: 10px; }
    .surprise-message p { font-size: 1.1rem; color: var(--text-dark); line-height: 1.5; }
</style>

<div class="final-gift-section fade-in">
    <h2 class="script-heading dark">One Last Surprise...</h2>
    <p class="click-instruction">Tap the box to open 🎁</p>

    <div class="minimal-gift-container" id="minimal-gift-container">
        <div class="minimal-gift-box" id="minimal-gift">
            <div class="minimal-gift-lid">
                <div class="gift-ribbon-h"></div>
                <div class="gift-ribbon-v"></div>
            </div>
            <div class="minimal-gift-body">
                <div class="gift-ribbon-v-body"></div>
            </div>
        </div>
    </div>

    <div class="surprise-message" id="surpriseMessage">
        <h3>You are the best thing in my life ❤️</h3>
        <p>This little website is just a small way to show how special you are.</p>
    </div>
</div>
