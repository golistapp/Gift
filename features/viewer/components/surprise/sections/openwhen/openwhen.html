<style>
    /* ==========================================
       OPEN WHEN... PREMIUM SCRATCH + FLIP CARDS
       ========================================== */
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,500;1,600&display=swap');

    .openwhen-section { 
        padding: 50px 20px; 
        text-align: center; 
        display: flex;
        flex-direction: column;
        align-items: center;
        background: transparent;
        overflow-x: hidden; /* Scroll animation ke bahar nikalne ko rokne ke liye */
    }
    
    /* 🔴 PREMIUM TITLE (reasons.html jaisa) */
    .ow-main-title {
        margin-bottom: 40px;
        text-shadow: 2px 2px 10px rgba(255, 255, 255, 0.8);
        line-height: 1.2;
    }
    
    .title-line1 {
        font-family: var(--font-ui, sans-serif); 
        font-size: clamp(2.2rem, 6vw, 4.2rem);
        font-weight: 800;
        color: #cc0033;
        text-transform: uppercase;
        letter-spacing: 2px;
        display: block;
    }

    .title-line2 {
        font-family: 'Playfair Display', serif; 
        font-size: clamp(1.5rem, 4vw, 2.5rem);
        font-style: italic;
        font-weight: 600;
        color: #4a0e1c;
        display: block;
        margin-top: -5px;
    }

    /* 🔴 RESPONSIVE GRID (Mobile, Tablet, PC) */
    .ow-cards-container { 
        display: grid; 
        grid-template-columns: 1fr; /* Mobile (1 Column) */
        gap: clamp(25px, 4vw, 40px); 
        width: 100%; 
        max-width: 1100px; 
        margin: 0 auto;
    }

    /* Tablet View */
    @media (min-width: 768px) {
        .ow-cards-container { grid-template-columns: repeat(2, 1fr); }
    }

    /* Desktop View */
    @media (min-width: 1024px) {
        .ow-cards-container { grid-template-columns: repeat(3, 1fr); }
    }

    /* 🔴 SCROLL ANIMATION BASE CLASS */
    .ow-card-wrapper {
        position: relative;
        width: 100%;
        aspect-ratio: 16 / 9;
        perspective: 1200px;
        -webkit-tap-highlight-color: transparent;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(255, 77, 121, 0.25);
        
        /* Shuru mein chhupa hua aur thoda niche rahega */
        opacity: 0;
        transform: translateY(60px);
        
        /* Smooth aane ke liye permanent transition */
        transition: opacity 0.8s ease-out, transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        will-change: opacity, transform;
    }

    /* 🔴 JAB CARD SCREEN PAR AAYEGA TO YE CLASS JS ADD KAREGA */
    .ow-card-wrapper.ow-show {
        opacity: 1;
        transform: translateY(0);
    }

    /* Foil Card jaisi Chamak (Shine) */
    .ow-card-wrapper::after {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        background: linear-gradient(110deg, transparent 25%, rgba(255,255,255,0.4) 45%, rgba(255,255,255,0.1) 55%, transparent 75%);
        border-radius: 12px;
        pointer-events: none;
        z-index: 25; 
        transition: opacity 0.5s ease;
    }

    .ow-card-wrapper.flipped::after {
        opacity: 0; 
    }

    /* Smooth Canvas Overlay */
    .scratch-canvas {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        z-index: 20;
        border-radius: 12px;
        touch-action: none; 
        transition: opacity 0.4s ease, transform 0.4s ease;
        box-shadow: inset 0 0 15px rgba(0,0,0,0.05); 
    }

    .scratch-canvas.revealed {
        opacity: 0;
        transform: scale(1.05); 
        pointer-events: none; 
    }

    /* 3D Flip Inner Container */
    .ow-card-inner {
        width: 100%;
        height: 100%;
        position: relative;
        transition: transform 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        transform-style: preserve-3d;
        border-radius: 12px;
        box-shadow: 0 12px 30px rgba(216, 27, 96, 0.2);
    }

    .ow-card-wrapper.flipped .ow-card-inner {
        transform: rotateY(180deg);
    }

    .ow-card-front, .ow-card-back {
        position: absolute;
        width: 100%;
        height: 100%;
        backface-visibility: hidden;
        border-radius: 12px;
        overflow: hidden;
        background: #ffffff;
    }

    .ow-card-front img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
    }

    .to-name-overlay {
        position: absolute;
        top: 15px;
        left: 20px;
        font-family: var(--font-ui, sans-serif); 
        font-size: 1.1rem; 
        font-weight: 600;
        color: #cc0033;
        z-index: 10;
        text-shadow: 1px 1px 3px rgba(255, 255, 255, 0.9), 0 0 15px rgba(255,255,255,0.9); 
    }

    .to-name-overlay .dynamic-gf-name {
        font-family: 'Playfair Display', serif; 
        font-size: 1.6rem;
        font-weight: 700;
        margin-left: 5px;
    }

    .ow-card-back {
        background: #fffdf9;
        transform: rotateY(180deg);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 25px;
        border: 3px solid #ff4d79;
        box-shadow: inset 0 0 20px rgba(216, 27, 96, 0.05);
    }

    .ow-back-text {
        font-family: 'Playfair Display', serif;
        font-size: clamp(1.1rem, 3vw, 1.35rem);
        color: #3a0a14;
        line-height: 1.5;
        text-align: center;
        font-weight: 600;
        z-index: 2;
    }

    .ow-back-dec { position: absolute; color: #ffb3c6; opacity: 0.4; z-index: 1; }
    .ow-dec-1 { top: 15px; left: 15px; font-size: 1.2rem; transform: rotate(-15deg); }
    .ow-dec-2 { bottom: 15px; right: 15px; font-size: 1.5rem; transform: rotate(20deg); }

</style>
