<style>
  /* Premium Envelope CSS */
  .envelope-container { perspective: 1200px; display: flex; flex-direction: column; align-items: center; margin-top: 20px;}
  .envelope-wrapper { position: relative; width: 320px; height: 220px; margin: 0 auto; cursor: pointer; transition: transform 0.5s ease; }
  .envelope-wrapper:hover { transform: translateY(-10px) scale(1.02); }
  .envelope { position: relative; width: 100%; height: 100%; background: #a80026; border-radius: 8px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }

  .env-front { position: absolute; top:0; left:0; width: 0; height: 0; border-left: 160px solid #cc0033; border-right: 160px solid #cc0033; border-bottom: 110px solid #b3002d; border-top: 110px solid transparent; z-index: 3; border-bottom-left-radius: 8px; border-bottom-right-radius: 8px;}
  .env-flap { position: absolute; top:0; left:0; width: 0; height: 0; border-left: 160px solid transparent; border-right: 160px solid transparent; border-top: 130px solid #e60039; z-index: 4; transform-origin: top; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }

  .env-letter-preview { position: absolute; top: 10px; left: 15px; width: 290px; height: 190px; background: #fffdf9; border-radius: 8px; z-index: 2; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); display: flex; align-items: center; justify-content: center; border: 2px solid #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.1); overflow: hidden; }
  .env-letter-preview img { width: 100%; height: 100%; object-fit: cover; }

  .heart-seal { position: absolute; top: 115px; left: 50%; transform: translateX(-50%); color: white; font-size: 30px; z-index: 5; transition: opacity 0.3s; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.3));}

  /* Open Animations */
  .envelope-wrapper.open .env-flap { transform: rotateX(180deg); z-index: 1; }
  .envelope-wrapper.open .heart-seal { opacity: 0; }
  .envelope-wrapper.open .env-letter-preview { transform: translateY(-120px); z-index: 3; box-shadow: 0 15px 30px rgba(0,0,0,0.2); }
  .envelope-wrapper.open { animation: envelopeFloat 3s infinite ease-in-out; }
  @keyframes envelopeFloat { 0%, 100% { transform: translateY(-10px) scale(1.02); } 50% { transform: translateY(-20px) scale(1.02); } }
  .tap-text { margin-top: 30px; font-weight: 500; color: var(--deep-red); transition: opacity 0.3s; }

  /* Notebook Letter CSS */
  #love-notes-section { display: none; width: 100%; justify-content: center; margin-top: 80px; opacity: 0; transition: opacity 1s ease; padding: 0 15px;}
  .notebook-page { background: #fffdf5; width: 100%; max-width: 600px; padding: 50px 30px; border-radius: 8px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: left; position: relative; background-image: repeating-linear-gradient(transparent, transparent 31px, rgba(0, 150, 255, 0.15) 31px, rgba(0, 150, 255, 0.15) 32px); line-height: 32px; }
  .notebook-page::after { content: ''; position: absolute; left: 15px; top: 0; height: 100%; width: 20px; background: radial-gradient(circle, #ddd 30%, transparent 35%) 0 0 / 20px 32px; }
  .notebook-page::before { content: ''; position: absolute; top: 0; bottom: 0; left: 45px; width: 2px; background: rgba(255, 0, 0, 0.3); }

  .romantic-letter-content { font-family: var(--font-ui); font-size: 1.15rem; color: var(--text-dark); padding-left: 20px; z-index: 2; position: relative; line-height: 32px; font-weight: 500; }

  /* 🔴 UPDATED: margin-bottom ko 32px kar diya taki ek line ka gap aaye */
  .letter-line { opacity: 0; transform: translateY(15px); margin-bottom: 32px; }

  .letter-signature { text-align: right; margin-top: 35px; font-weight: 700; color: var(--deep-red); font-size: 1.8rem; font-family: var(--font-heading);}

  .fade-in-text { animation: romanticFade 1.5s ease-out forwards; }
  @keyframes romanticFade { to { opacity: 1; transform: translateY(0); } }
</style>

<div class="envelope-container fade-in" id="envelope-main-view">
  <div class="envelope-wrapper" id="envelope">
      <div class="envelope">
          <div class="env-front"></div>
          <div class="env-letter-preview">
              <img id="envelope-dynamic-card" src="assets/image/you are happy.jpg" alt="Surprise Card">
          </div>
          <div class="env-flap"></div>
          <i class="fa-solid fa-heart heart-seal"></i>
      </div>
  </div>
  <p class="tap-text" id="env-instructions">Tap to open my heart 💌</p>
</div>

<div id="love-notes-section">
  <div class="notebook-page">
      <div class="romantic-letter-content" id="dynamic-letter-container">
          </div>
      <div class="romantic-letter-content">
          <p class="letter-line letter-signature" id="letter-sig">Forever Yours ❤️</p>
      </div>
  </div>
</div>
