<style>
    /* 🔴 Google Fonts Import */
    @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,600;1,600&display=swap');

    .hero-section {
        position: relative;
        display: flex;
        justify-content: center;
        align-items: flex-start; 
        width: 100%;
        min-height: 100vh !important; 
        padding: 0px 10px 50px 10px; 
        overflow: hidden; 
        z-index: 1; 
    }

    .hero-bg-blur {
        position: absolute;
        top: -20px; left: -20px; right: -20px; bottom: -20px;
        background-image: url('assets/image/hero.jpg'); /* Default for Mobile */
        background-size: cover;
        background-position: center;
        filter: blur(4px);
        z-index: -1; 
        opacity: 0.9;
    }

    /* 🔴 NAYA: Desktop aur Tablet (768px se badi screen) ke liye alag image */
    @media screen and (min-width: 768px) {
        .hero-bg-blur {
            background-image: url('assets/image/hero_dp.jpg');
        }
    }

    .hero-card { 
        padding: 20px 20px 40px 20px !important;
        border-radius: 20px; 
        position: relative; 
        overflow: hidden;
        background: #ffffff; 
        border: 1px solid rgba(255, 77, 121, 0.2); 
        box-shadow: 0 35px 65px rgba(0, 0, 0, 0.15), 0 15px 25px rgba(216, 27, 96, 0.1); 
        width: 98%;
        max-width: 580px;
        min-height: 480px; 
        margin: -5px auto 0 auto;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        z-index: 10;
    }
    
    .card-watermark {
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        width: 75%; max-width: 280px; opacity: 0.08; pointer-events: none; z-index: 0;
    }

    .card-texture { 
        position: absolute; pointer-events: none; z-index: 0; opacity: 0.15; 
        animation: floatTexture 4s infinite alternate ease-in-out; 
    }
    .ct-1 { top: 10%; left: 15%; color: #ff4d79; font-size: 16px; }  
    .ct-2 { top: 20%; right: 12%; color: #9333ea; font-size: 10px; } 
    .ct-3 { bottom: 25%; right: 10%; color: #ff4d79; font-size: 18px; } 
    .ct-4 { bottom: 15%; left: 12%; color: #d81b60; font-size: 12px; } 
    .ct-5 { top: 40%; left: 8%; color: #9333ea; font-size: 14px; }    
    .ct-6 { top: 55%; right: 8%; color: #ffb3c6; font-size: 12px; }   
    .ct-7 { top: 75%; left: 15%; color: #ffd1dc; font-size: 15px; }   
    .ct-8 { bottom: 10%; right: 20%; color: #d81b60; font-size: 9px; } 

    @keyframes floatTexture { 0% { transform: translateY(0px) scale(1); } 100% { transform: translateY(-10px) scale(1.1); } }

    /* 🔴 TEXT WRAPPER - Isse sab kuch card ke theek centre mein aayega */
    .hero-text-wrapper {
        flex-grow: 1; 
        display: flex; 
        flex-direction: column; 
        justify-content: center !important; 
        align-items: center; 
        width: 100%;
    }

    .rose-container {
        z-index: 1;
        opacity: 0; 
        transform: scale(0.5);
        transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        margin-top: 0px !important; 
        margin-bottom: 5px !important; 
    }
    
    .top-rose {
        font-size: 2.5rem;
        margin-bottom: 0px !important;
        filter: drop-shadow(0 4px 6px rgba(0,0,0,0.15));
        animation: roseSway 3s infinite alternate ease-in-out;
    }
    @keyframes roseSway { 0% { transform: rotate(-10deg); } 100% { transform: rotate(10deg); } }

    .hero-title, .hero-name { 
        position: relative; z-index: 1; opacity: 0; width: 100%; 
        transform: translateY(20px);
        transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .hero-subtitle, .bounce-icon { 
        position: relative; z-index: 1; opacity: 0; width: 100%; 
    }

    .show-element {
        opacity: 1 !important;
        transform: translateY(0) scale(1) !important;
    }

    /* 🔴 ALAG SE CSS: TITLE (Happy Birthday) Ke liye */
    .hero-title { 
        font-family: var(--font-heading); 
        font-size: clamp(2.2rem, 8vw, 3.5rem); 
        color: #b3003b; 
        margin-top: 0px !important; 
        margin-bottom: 25px !important; 
        text-shadow: 1px 1px 2px rgba(255,255,255,0.8); 
        line-height: 1.2; 
        white-space: normal; 
    }
    
    /* 🔴 ALAG SE CSS: NAME (Khusi) Ke liye */
    .hero-name { 
        font-family: 'Great Vibes', cursive; 
        font-size: clamp(4.5rem, 16vw, 7.5rem); 
        color: #d81b60; 
        font-weight: 400; 
        text-shadow: 2px 2px 10px rgba(216, 27, 96, 0.2), 1px 1px 2px rgba(0,0,0,0.05); 
        margin: 0px !important; 
        line-height: 1; 
        word-wrap: break-word;
    }
    
    /* 🔴 ALAG SE CSS: SUBTITLE Ke liye */
    .hero-subtitle { 
        font-family: 'Playfair Display', serif; 
        font-style: italic; 
        font-weight: 600; 
        font-size: clamp(1.1rem, 4vw, 1.4rem); 
        color: #333333; 
        line-height: 1.5; 
        margin-top: 40px !important; 
        padding: 0 15px; 
    } 
    
    .bounce-icon { 
        font-size: 24px; color: #fb7185; animation: bounce 2s infinite; 
        margin-top: auto !important; 
        padding-top: 20px; 
    } 

    .typing-cursor { display: inline-block; width: 2px; height: 1em; background-color: var(--deep-red); animation: blinkCursor 0.7s infinite; margin-left: 3px; vertical-align: text-bottom; }
    @keyframes blinkCursor { 50% { opacity: 0; } }
    @keyframes bounce { 0%, 100% { transform: translateY(0); opacity: 1; } 50% { transform: translateY(-10px); opacity: 1;} }
</style>

<div class="viewer-section hero-section fade-in">
    <div class="hero-bg-blur"></div>

    <div class="glass-card hero-card" id="3d-hero-card">
        <img src="assets/image/logo.png" class="card-watermark" alt="Watermark">
        
        <i class="fa-solid fa-heart card-texture ct-1"></i>
        <i class="fa-solid fa-circle card-texture ct-2"></i>
        <i class="fa-solid fa-star card-texture ct-3"></i>
        <i class="fa-solid fa-heart card-texture ct-4"></i>
        <i class="fa-solid fa-circle card-texture ct-5"></i>
        <i class="fa-solid fa-star card-texture ct-6"></i>
        <i class="fa-solid fa-heart card-texture ct-7"></i>
        <i class="fa-solid fa-circle card-texture ct-8"></i>

        <div class="hero-text-wrapper">
            <div class="rose-container" id="dynamic-rose-container">
                <div class="top-rose">🌹</div>
            </div>
            
            <h1 class="hero-title" id="dynamic-occasion"></h1>
            <h1 class="hero-name" id="dynamic-gf-name"></h1>
            <p class="hero-subtitle" id="dynamic-subtitle"></p>
        </div>
        
        <i class="fa-solid fa-arrow-down bounce-icon hidden" id="scroll-hint-icon"></i>
    </div>
</div>
