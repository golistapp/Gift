<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AMP KART — Tool OS</title>
  
  <!-- SOCIAL MEDIA META TAGS (WhatsApp, Facebook, Link sharing preview) -->
  <meta name="title" content="AMP KART — Tool OS" />
  <meta name="description" content="AMP KART Control Panel - All your business tools in one place. Pricing Calculator, Image Compressor, QR Generator & more." />
  <meta name="theme-color" content="#000000" />

  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://golistapp.store/" />
  <meta property="og:title" content="AMP KART — Tool OS" />
  <meta property="og:description" content="AMP KART Control Panel - All your business tools in one place." />
  <meta property="og:image" content="https://ik.imagekit.io/nsyr92pse/1000201093-optimized.jpg" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:url" content="https://golistapp.store/" />
  <meta name="twitter:title" content="AMP KART — Tool OS" />
  <meta name="twitter:description" content="AMP KART Control Panel - All your business tools in one place." />
  <meta name="twitter:image" content="https://ik.imagekit.io/nsyr92pse/1000201093-optimized.jpg" />

  <!-- PWA Manifest Link -->
  <link rel="manifest" href="/manifest.json" />

  <!-- PWA iOS / Safari Support -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="AMP KART" />
  <link rel="apple-touch-icon" href="https://ik.imagekit.io/nsyr92pse/1000201093-optimized.jpg" />

  <!-- PWA Chrome / Android -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="application-name" content="AMP KART" />

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --y:    #FFD600;
      --yd:   #C9AC00;
      --yg:   rgba(255,214,0,.10);
      --blk:  #000000;
      --wht:  #FFFFFF;
      --blu:  #1E3A8A;
      --bg:   #EBEBEE;
      --card: #FFFFFF;
      --bdr:  #DDDFE8;
      --txt:  #0D0F14;
      --sub:  #6B7280;
      --r:    14px;
      --rsm:  8px;
      --f:    'Poppins', sans-serif;
      --ease: .18s cubic-bezier(.4,0,.2,1);
      --hh:   54px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--f);
      background: var(--bg);
      color: var(--txt);
      min-height: 100vh;
      overflow-x: hidden;
    }
    a { text-decoration: none; color: inherit; }
    button { font-family: var(--f); cursor: pointer; border: none; background: none; outline: none; }

    /* ── HEADER ─────────────────────────────────────── */
    .hdr {
      position: fixed; top: 0; left: 0; right: 0; z-index: 300;
      height: var(--hh);
      background: var(--blk);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 18px;
      border-bottom: 2px solid var(--y);
    }
    .hdr-left { display: flex; align-items: center; gap: 10px; }
    .logo {
      width: 32px; height: 32px; border-radius: var(--rsm);
      background: var(--y);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 800; color: var(--blk);
      overflow: hidden; flex-shrink: 0;
    }
    .logo img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .brand { font-size: 16px; font-weight: 800; color: var(--y); letter-spacing: 1.5px; }
    .brand-sub { font-size: 8px; color: rgba(255,255,255,.32); letter-spacing: .4px; text-transform: uppercase; }
    .hdr-right { display: flex; align-items: center; gap: 10px; }
    .badge-int {
      font-size: 9px; font-weight: 600;
      background: rgba(255,214,0,.1);
      border: 1px solid rgba(255,214,0,.28);
      color: var(--y); padding: 3px 9px;
      border-radius: 20px; letter-spacing: .3px;
    }
    
    /* PWA Install Button */
    .install-btn {
      font-size: 10px; font-weight: 700;
      background: rgba(255,214,0,.15);
      border: 1px solid rgba(255,214,0,.4);
      color: var(--y); padding: 5px 10px;
      border-radius: var(--rsm); letter-spacing: .3px;
      transition: var(--ease); text-transform: uppercase;
      display: flex; align-items: center; gap: 4px;
    }
    .install-btn:hover { background: var(--y); color: var(--blk); }
    .install-btn svg { width: 12px; height: 12px; }

    .settings-btn {
      width: 32px; height: 32px;
      background: rgba(255,255,255,.07);
      border-radius: var(--rsm);
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      transition: var(--ease);
      border: 1px solid rgba(255,255,255,.1);
    }
    .settings-btn:hover { background: rgba(255,214,0,.15); border-color: rgba(255,214,0,.35); }

    /* ── PAGE ───────────────────────────────────────── */
    .page {
      padding-top: calc(var(--hh) + 20px);
      padding-bottom: 50px;
    }
    .wrap { max-width: 900px; margin: 0 auto; padding: 0 16px; }

    /* ── HERO STRIP ─────────────────────────────────── */
    .hero-strip {
      background: var(--blk);
      border-radius: var(--r);
      padding: 16px 20px;
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 18px;
      border: 1.5px solid rgba(255,214,0,.15);
      animation: fu .4s ease both;
    }
    .hero-left {}
    .hero-title {
      font-size: clamp(22px,4vw,30px);
      font-weight: 800; color: var(--wht);
      letter-spacing: -.2px; line-height: 1;
    }
    .hero-title em { color: var(--y); font-style: normal; }
    .hero-sub { font-size: 11px; color: rgba(255,255,255,.38); margin-top: 3px; font-weight: 400; }
    .hero-right { display: flex; gap: 10px; flex-shrink: 0; }
    .metric {
      text-align: right;
    }
    .metric-val { font-size: 20px; font-weight: 700; color: var(--y); line-height: 1; }
    .metric-val.w { color: var(--wht); }
    .metric-lbl { font-size: 9px; color: rgba(255,255,255,.3); text-transform: uppercase; letter-spacing: .3px; }

    /* ── TOOL GRID ──────────────────────────────────── */
    .grid-wrap { animation: fu .4s .08s ease both; }
    .tool-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    @media(max-width: 580px) { .tool-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; } }
    @media(max-width: 340px) { .tool-grid { grid-template-columns: 1fr; } }

    /* ── TOOL CARD ──────────────────────────────────── */
    .tc {
      background: var(--card);
      border: 1.5px solid var(--bdr);
      border-radius: var(--r);
      padding: 16px 14px 14px;
      display: flex; flex-direction: column; gap: 11px;
      position: relative; overflow: hidden;
      transition: transform var(--ease), box-shadow var(--ease), border-color var(--ease);
      cursor: pointer;
      user-select: none;
    }
    .tc::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0;
      height: 2px; background: var(--y);
      transform: scaleX(0); transform-origin: left;
      transition: transform var(--ease);
    }
    .tc.acc-blue::before { background: var(--blu); }
    .tc:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.1); border-color: rgba(255,214,0,.35); }
    .tc:hover::before { transform: scaleX(1); }
    .tc.disabled { opacity: .42; pointer-events: none; }
    .tc.hidden-tool { display: none; }

    /* drag states */
    .tc.dragging { opacity: .35; transform: scale(.97); }
    .tc.drag-over { border-color: var(--y); box-shadow: 0 0 0 2px rgba(255,214,0,.3); }

    .tc-top { display: flex; align-items: center; justify-content: space-between; }
    .tc-icon {
      width: 38px; height: 38px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .iy { background: rgba(255,214,0,.13); }
    .ib { background: rgba(30,58,138,.09); }
    .ig { background: rgba(16,185,129,.09); }
    .io { background: rgba(249,115,22,.09); }
    .ip { background: rgba(139,92,246,.09); }
    .ir { background: rgba(239,68,68,.09); }

    .tc-name { font-size: 13px; font-weight: 700; color: var(--txt); line-height: 1.2; }

    .tc-foot { display: flex; align-items: center; justify-content: space-between; }
    .badge { font-size: 9px; font-weight: 600; padding: 2px 7px; border-radius: 20px; letter-spacing: .2px; }
    .bl { background: rgba(16,185,129,.11); color: #059669; }
    .bb { background: rgba(30,58,138,.11); color: var(--blu); }
    .bs { background: rgba(249,115,22,.09); color: #c2640a; }

    .open-btn {
      font-size: 10px; font-weight: 700;
      background: var(--blk); color: var(--y);
      padding: 5px 12px; border-radius: 6px;
      letter-spacing: .3px; transition: var(--ease);
      text-transform: uppercase;
    }
    .open-btn:hover { background: var(--y); color: var(--blk); }

    /* card stagger */
    .tc:nth-child(1){animation:fu .35s .10s ease both}
    .tc:nth-child(2){animation:fu .35s .14s ease both}
    .tc:nth-child(3){animation:fu .35s .18s ease both}
    .tc:nth-child(4){animation:fu .35s .22s ease both}
    .tc:nth-child(5){animation:fu .35s .26s ease both}
    .tc:nth-child(6){animation:fu .35s .30s ease both}
    .tc:nth-child(7){animation:fu .35s .34s ease both}
    .tc:nth-child(8){animation:fu .35s .38s ease both}

    /* ── SETTINGS PANEL ─────────────────────────────── */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.5);
      z-index: 400; opacity: 0; pointer-events: none;
      transition: opacity .25s;
    }
    .overlay.open { opacity: 1; pointer-events: all; }

    .settings-panel {
      position: fixed; top: 0; right: 0; bottom: 0;
      width: min(360px, 95vw);
      background: var(--wht);
      z-index: 500;
      transform: translateX(100%);
      transition: transform .3s cubic-bezier(.4,0,.2,1);
      display: flex; flex-direction: column;
      box-shadow: -8px 0 32px rgba(0,0,0,.15);
    }
    .settings-panel.open { transform: translateX(0); }

    .sp-head {
      background: var(--blk);
      padding: 16px 18px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 2px solid var(--y);
      flex-shrink: 0;
    }
    .sp-title { font-size: 15px; font-weight: 700; color: var(--y); letter-spacing: .5px; }
    .sp-close {
      width: 30px; height: 30px;
      background: rgba(255,255,255,.08);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      color: rgba(255,255,255,.6); font-size: 16px;
      transition: var(--ease);
    }
    .sp-close:hover { background: rgba(255,214,0,.2); color: var(--y); }

    .sp-body { flex: 1; overflow-y: auto; padding: 14px 16px; }
    .sp-section-title {
      font-size: 10px; font-weight: 700;
      color: var(--sub); text-transform: uppercase;
      letter-spacing: .8px; margin-bottom: 10px;
    }

    /* settings list items */
    .sp-item {
      background: #F7F8FA;
      border: 1.5px solid var(--bdr);
      border-radius: 10px;
      padding: 10px 12px;
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 8px;
      cursor: grab;
      transition: var(--ease);
    }
    .sp-item:active { cursor: grabbing; }
    .sp-item.dragging-sp { opacity: .3; }
    .sp-item.drag-over-sp { border-color: var(--y); background: var(--yg); }

    .sp-drag { color: #ccc; font-size: 14px; flex-shrink: 0; cursor: grab; }
    .sp-icon { font-size: 16px; flex-shrink: 0; }
    .sp-name { font-size: 12px; font-weight: 600; color: var(--txt); flex: 1; }
    .sp-status { font-size: 9px; font-weight: 600; color: var(--sub); }

    /* toggle switch */
    .toggle {
      position: relative; width: 36px; height: 20px; flex-shrink: 0;
    }
    .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
    .toggle-track {
      position: absolute; inset: 0;
      background: #D1D5DB; border-radius: 20px;
      transition: var(--ease); cursor: pointer;
    }
    .toggle-track::after {
      content: '';
      position: absolute; top: 3px; left: 3px;
      width: 14px; height: 14px;
      background: var(--wht); border-radius: 50%;
      transition: var(--ease);
      box-shadow: 0 1px 3px rgba(0,0,0,.2);
    }
    .toggle input:checked + .toggle-track { background: var(--blk); }
    .toggle input:checked + .toggle-track::after { transform: translateX(16px); }

    .sp-foot {
      padding: 14px 16px;
      border-top: 1px solid var(--bdr);
      flex-shrink: 0;
    }
    .sp-save {
      width: 100%;
      background: var(--blk); color: var(--y);
      font-size: 13px; font-weight: 700;
      padding: 12px; border-radius: 10px;
      letter-spacing: .5px; transition: var(--ease);
      text-transform: uppercase;
    }
    .sp-save:hover { background: var(--y); color: var(--blk); }

    /* ── FOOTER ─────────────────────────────────────── */
    .footer {
      text-align: center; margin-top: 32px;
      font-size: 10px; color: #bbb;
      border-top: 1px solid var(--bdr);
      padding-top: 16px;
    }

    /* ── TOAST ──────────────────────────────────────── */
    .toast {
      position: fixed; bottom: 20px; left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: var(--blk); color: var(--y);
      font-size: 12px; font-weight: 600;
      padding: 9px 20px; border-radius: 30px;
      border: 1.5px solid rgba(255,214,0,.35);
      z-index: 999; pointer-events: none; white-space: nowrap;
      transition: transform .28s cubic-bezier(.4,0,.2,1);
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ── PWA INSTALL BOTTOM BANNER ─────────────────────── */
    .install-banner {
      position: fixed; bottom: 0; left: 0; right: 0;
      z-index: 998;
      background: var(--blk);
      border-top: 2px solid var(--y);
      padding: 14px 18px;
      display: flex; align-items: center; gap: 12px;
      transform: translateY(100%);
      transition: transform .35s cubic-bezier(.4,0,.2,1);
      box-shadow: 0 -8px 32px rgba(0,0,0,.3);
    }
    .install-banner.show { transform: translateY(0); }
    .install-banner-icon {
      width: 42px; height: 42px; border-radius: 10px;
      background: var(--y); flex-shrink: 0; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 13px; color: var(--blk);
    }
    .install-banner-icon img { width: 100%; height: 100%; object-fit: cover; }
    .install-banner-text { flex: 1; min-width: 0; }
    .install-banner-title { font-size: 13px; font-weight: 700; color: var(--wht); line-height: 1.2; }
    .install-banner-sub { font-size: 10px; color: rgba(255,255,255,.45); margin-top: 2px; }
    .install-banner-actions { display: flex; gap: 8px; flex-shrink: 0; align-items: center; }
    .btn-install-now {
      background: var(--y); color: var(--blk);
      font-size: 12px; font-weight: 700;
      padding: 8px 16px; border-radius: 8px;
      border: none; cursor: pointer;
      letter-spacing: .3px; text-transform: uppercase;
      transition: var(--ease); white-space: nowrap;
    }
    .btn-install-now:hover { background: var(--yd); }
    .btn-install-now:active { transform: scale(.97); }
    .btn-dismiss {
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.15);
      color: rgba(255,255,255,.5);
      font-size: 18px; width: 32px; height: 32px;
      border-radius: 8px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: var(--ease); flex-shrink: 0;
    }
    .btn-dismiss:hover { background: rgba(255,255,255,.14); color: var(--wht); }

    /* ── PWA UPDATE BANNER ───────────────────────────────── */
    .update-banner {
      position: fixed; top: calc(var(--hh) + 6px); left: 50%;
      transform: translateX(-50%) translateY(-80px);
      z-index: 998;
      background: #1a1a1a;
      border: 1.5px solid rgba(255,214,0,.4);
      border-radius: 12px;
      padding: 10px 16px;
      display: flex; align-items: center; gap: 10px;
      transition: transform .3s cubic-bezier(.4,0,.2,1);
      white-space: nowrap;
      box-shadow: 0 8px 24px rgba(0,0,0,.4);
    }
    .update-banner.show { transform: translateX(-50%) translateY(0); }
    .update-banner-text { font-size: 12px; font-weight: 600; color: rgba(255,255,255,.8); }
    .btn-update {
      background: var(--y); color: var(--blk);
      font-size: 11px; font-weight: 700;
      padding: 5px 12px; border-radius: 6px;
      border: none; cursor: pointer;
      letter-spacing: .3px; transition: var(--ease);
    }
    .btn-update:hover { background: var(--yd); }
    .btn-update-dismiss {
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.15);
      color: rgba(255,255,255,.5);
      font-size: 14px; width: 26px; height: 26px;
      border-radius: 6px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: var(--ease); flex-shrink: 0; padding: 0;
      font-family: var(--f);
    }
    .btn-update-dismiss:hover { background: rgba(255,255,255,.18); color: var(--wht); }

    @media(max-width:400px) {
      .install-banner { padding: 12px 14px; gap: 10px; }
      .btn-install-now { padding: 7px 12px; font-size: 11px; }
    }

    /* ── ANIMATIONS ─────────────────────────────────── */
    @keyframes fu {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--bdr); border-radius: 4px; }
  </style>
</head>
<body>

<!-- ── HEADER ─────────────────────────────────────────── -->
<header class="hdr">
  <div class="hdr-left">
    <div class="logo">
      <img src="https://ik.imagekit.io/nsyr92pse/1000201093-optimized.jpg" alt="" onerror="this.parentElement.textContent='AK'" />
    </div>
    <div>
      <div class="brand">AMP KART</div>
      <div class="brand-sub">Advanced Market Platform</div>
    </div>
  </div>

  <div class="hdr-right">
    <!-- PWA Install Button -->
    <button id="installAppBtn" class="install-btn" style="display: none;" title="Install App">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      App
    </button>
    <span class="badge-int">● Internal</span>
    <button class="settings-btn" onclick="openSettings()" title="Settings">⚙️</button>
  </div>
</header>

<!-- ── PAGE ───────────────────────────────────────────── -->
<main class="page">
  <div class="wrap">

    <!-- HERO STRIP -->
    <div class="hero-strip">
      <div class="hero-left">
        <div class="hero-title">TOOL <em>OS</em></div>
        <div class="hero-sub">AMP KART Control Panel · All tools in one place</div>
      </div>
      <div class="hero-right">
        <div class="metric">
          <div class="metric-val" id="m-live">3</div>
          <div class="metric-lbl">Live</div>
        </div>
        <div class="metric">
          <div class="metric-val w" id="m-total">8</div>
          <div class="metric-lbl">Total</div>
        </div>
      </div>
    </div>

    <!-- TOOL GRID -->
    <div class="grid-wrap">
      <div class="tool-grid" id="toolGrid"></div>
    </div>

  </div><!-- /wrap -->
</main>

<!-- ── FOOTER ──────────────────────────────────────────── -->
<footer class="footer">
  <strong style="color:var(--sub)">AMP KART INTERNAL SYSTEM</strong> &nbsp;·&nbsp; Tool OS v3.0 &nbsp;·&nbsp; © 2025
</footer>

<!-- ── SETTINGS OVERLAY + PANEL ───────────────────────── -->
<div class="overlay" id="overlay" onclick="closeSettings()"></div>

<aside class="settings-panel" id="settingsPanel">
  <div class="sp-head">
    <span class="sp-title">⚙ SETTINGS</span>
    <button class="sp-close" onclick="closeSettings()">✕</button>
  </div>
  <div class="sp-body">
    <div class="sp-section-title">Reorder & Manage Tools</div>
    <div id="spList"></div>
  </div>
  <div class="sp-foot">
    <button class="sp-save" onclick="saveSettings()">Save &amp; Apply</button>
  </div>
</aside>

<!-- ── TOAST ───────────────────────────────────────────── -->
<div class="toast" id="toast"></div>

<!-- ── PWA BOTTOM INSTALL BANNER ──────────────────────── -->
<div class="install-banner" id="installBanner" role="dialog" aria-label="Install AMP KART app">
  <div class="install-banner-icon">
    <img src="https://ik.imagekit.io/nsyr92pse/1000201093-optimized.jpg" alt="AMP KART" onerror="this.parentElement.textContent='AK'" />
  </div>
  <div class="install-banner-text">
    <div class="install-banner-title">Install AMP KART</div>
    <div class="install-banner-sub">Add to home screen for best experience</div>
  </div>
  <div class="install-banner-actions">
    <button class="btn-install-now" id="bannerInstallBtn">Install</button>
    <button class="btn-dismiss" id="bannerDismissBtn" aria-label="Dismiss">✕</button>
  </div>
</div>

<!-- ── PWA UPDATE BANNER ───────────────────────────────── -->
<div class="update-banner" id="updateBanner" role="alert">
  <span class="update-banner-text">🔄 New version available!</span>
  <button class="btn-update" id="updateBtn">Update</button>
  <button class="btn-update-dismiss" id="updateDismissBtn" aria-label="Dismiss update">✕</button>
</div>

const STORE_KEY = 'ampkart_tools_v3';

/* ── LOAD / SAVE CONFIG ─────────────────────────────── */
function loadConfig() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (!raw) return TOOLS_DEFAULT.map(t => ({...t}));
    const saved = JSON.parse(raw);
    return saved.map(s => {
      const def = TOOLS_DEFAULT.find(d => d.id === s.id);
      return def ? { ...def, enabled: s.enabled } : null;
    }).filter(Boolean);
  } catch { return TOOLS_DEFAULT.map(t => ({...t})); }
}

function saveConfig(tools) {
  localStorage.setItem(STORE_KEY, JSON.stringify(
    tools.map(t => ({ id: t.id, enabled: t.enabled }))
  ));
}

let tools = loadConfig();

/* ── STATUS HELPERS ─────────────────────────────────── */
const badgeMap = {
  live: '<span class="badge bl">● Live</span>',
  beta: '<span class="badge bb">⬡ Beta</span>',
  soon: '<span class="badge bs">◌ Soon</span>',
};
function accentClass(t) { return t.status === 'beta' || t.id === 'compressor' || t.id === 'orders' ? 'acc-blue' : ''; }

/* ── RENDER TOOL GRID ───────────────────────────────── */
function renderGrid() {
  const grid = document.getElementById('toolGrid');
  grid.innerHTML = '';
  tools.forEach((t, i) => {
    if (!t.enabled) return;
    const div = document.createElement('div');
    div.className = `tc ${accentClass(t)}`;
    div.dataset.id = t.id;
    div.dataset.idx = i;
    div.innerHTML = `
      <div class="tc-top">
        <div class="tc-icon ${t.ic}">${t.icon}</div>
        ${badgeMap[t.status]}
      </div>
      <span class="tc-name">${t.name}</span>
      <div class="tc-foot">
        <button class="open-btn" data-url="${t.url}" data-name="${t.name}" data-status="${t.status}">Open</button>
      </div>`;
    grid.appendChild(div);
  });

  grid.querySelectorAll('.open-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const { url, name, status } = btn.dataset;
      if (status === 'soon') { showToast(`${name} — Coming Soon!`); return; }
      window.location.href = url;
    });
  });

  grid.querySelectorAll('.tc').forEach(card => {
    card.addEventListener('click', () => {
      const btn = card.querySelector('.open-btn');
      btn && btn.click();
    });
    card.addEventListener('pointerdown', function() {
      this.style.transform = 'scale(.97)';
      setTimeout(() => this.style.transform = '', 120);
    });
  });

  document.getElementById('m-live').textContent = tools.filter(t => t.status === 'live' && t.enabled).length;
  document.getElementById('m-total').textContent = tools.filter(t => t.enabled).length;
}

/* ── SETTINGS PANEL ─────────────────────────────────── */
function openSettings() {
  renderSpList();
  document.getElementById('settingsPanel').classList.add('open');
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeSettings() {
  document.getElementById('settingsPanel').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function renderSpList() {
  const list = document.getElementById('spList');
  list.innerHTML = '';
  tools.forEach((t, i) => {
    const div = document.createElement('div');
    div.className = 'sp-item';
    div.draggable = true;
    div.dataset.id = t.id;
    div.dataset.spIdx = i;
    div.innerHTML = `
      <span class="sp-drag">⠿</span>
      <span class="sp-icon">${t.icon}</span>
      <span class="sp-name">${t.name}</span>
      <span class="sp-status">${t.status.toUpperCase()}</span>
      <label class="toggle">
        <input type="checkbox" ${t.enabled ? 'checked' : ''} data-id="${t.id}" />
        <div class="toggle-track"></div>
      </label>`;
    list.appendChild(div);
  });

  let dragSrc = null;
  list.querySelectorAll('.sp-item').forEach(item => {
    item.addEventListener('dragstart', e => {
      dragSrc = item;
      setTimeout(() => item.classList.add('dragging-sp'), 0);
      e.dataTransfer.effectAllowed = 'move';
    });
    item.addEventListener('dragend', () => {
      item.classList.remove('dragging-sp');
      list.querySelectorAll('.sp-item').forEach(i => i.classList.remove('drag-over-sp'));
    });
    item.addEventListener('dragover', e => {
      e.preventDefault();
      if (item !== dragSrc) {
        list.querySelectorAll('.sp-item').forEach(i => i.classList.remove('drag-over-sp'));
        item.classList.add('drag-over-sp');
      }
    });
    item.addEventListener('drop', e => {
      e.preventDefault();
      if (item === dragSrc) return;
      item.classList.remove('drag-over-sp');
      const fromId = dragSrc.dataset.id;
      const toId   = item.dataset.id;
      const fromI  = tools.findIndex(t => t.id === fromId);
      const toI    = tools.findIndex(t => t.id === toId);
      const [moved] = tools.splice(fromI, 1);
      tools.splice(toI, 0, moved);
      renderSpList();
    });
  });
}

function saveSettings() {
  document.querySelectorAll('#spList .toggle input').forEach(inp => {
    const t = tools.find(x => x.id === inp.dataset.id);
    if (t) t.enabled = inp.checked;
  });
  saveConfig(tools);
  renderGrid();
  closeSettings();
  showToast('Settings saved ✓');
}

/* ── TOAST ──────────────────────────────────────────── */
let toastT;
function showToast(msg) {
  const el = document.getElementById('toast');
  clearTimeout(toastT);
  el.textContent = msg;
  el.classList.add('show');
  toastT = setTimeout(() => el.classList.remove('show'), 2500);
}

/* ── INIT ───────────────────────────────────────────── */
renderGrid();

/* ═══════════════════════════════════════════════════════════
   PWA SYSTEM — Production Grade
   ═══════════════════════════════════════════════════════════ */

/* ── SERVICE WORKER REGISTRATION + UPDATE HANDLING ──────── */
let swRegistration = null;

if ('serviceWorker' in navigator) {
  window.addEventListener('load', async () => {
    try {
      swRegistration = await navigator.serviceWorker.register('/sw.js', {
        scope: '/',
        updateViaCache: 'none'
      });
      console.log('[PWA] Service Worker registered:', swRegistration.scope);

      /* Proactively check for SW updates */
      swRegistration.update().catch(() => {});

      /* New SW already waiting (e.g. user navigated back) */
      if (swRegistration.waiting) showUpdateBanner();

      /* New SW found during this session */
      swRegistration.addEventListener('updatefound', () => {
        const newSW = swRegistration.installing;
        if (!newSW) return;
        newSW.addEventListener('statechange', () => {
          if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
            showUpdateBanner();
          }
        });
      });

      /* After skipWaiting, reload so new SW takes over */
      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (!refreshing) { refreshing = true; window.location.reload(); }
      });

    } catch (err) {
      console.warn('[PWA] SW registration failed:', err);
    }
  });
}

/* ── UPDATE BANNER ───────────────────────────────────────── */
const UPDATE_SHOWN_KEY = 'ampkart_update_shown';

function showUpdateBanner() {
  /* Show only once per session — prevents re-showing on every reload */
  if (sessionStorage.getItem(UPDATE_SHOWN_KEY)) return;
  const banner = document.getElementById('updateBanner');
  if (banner) {
    sessionStorage.setItem(UPDATE_SHOWN_KEY, '1');
    setTimeout(() => banner.classList.add('show'), 600);
  }
}

function hideUpdateBanner() {
  document.getElementById('updateBanner')?.classList.remove('show');
}

document.getElementById('updateBtn')?.addEventListener('click', () => {
  hideUpdateBanner();
  if (swRegistration?.waiting) {
    swRegistration.waiting.postMessage({ type: 'SKIP_WAITING' });
  }
});

document.getElementById('updateDismissBtn')?.addEventListener('click', () => {
  hideUpdateBanner();
  /* Mark as dismissed for this session so it won't re-appear */
  sessionStorage.setItem(UPDATE_SHOWN_KEY, 'dismissed');
});

/* ── INSTALL PROMPT SYSTEM ───────────────────────────────── */
let deferredPrompt  = null;
const DISMISS_KEY   = 'ampkart_install_dismissed_ts';

function isStandalone() {
  return window.matchMedia('(display-mode: standalone)').matches ||
         window.navigator.standalone === true;
}

function wasDismissedRecently() {
  const ts = localStorage.getItem(DISMISS_KEY);
  return ts && (Date.now() - parseInt(ts)) < 3 * 24 * 60 * 60 * 1000;
}

function shouldShowInstall() {
  return !isStandalone() && !wasDismissedRecently();
}

function showInstallUI() {
  if (!shouldShowInstall()) return;
  document.getElementById('installAppBtn').style.display = 'flex';
  setTimeout(() => document.getElementById('installBanner')?.classList.add('show'), 1200);
}

function hideInstallUI() {
  document.getElementById('installAppBtn').style.display = 'none';
  document.getElementById('installBanner')?.classList.remove('show');
}

async function triggerInstall() {
  if (!deferredPrompt) return;
  hideInstallUI();
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  console.log('[PWA] Install outcome:', outcome);
  deferredPrompt = null;
  if (outcome === 'accepted') {
    showToast('Installing AMP KART… ✓');
  } else {
    localStorage.setItem(DISMISS_KEY, Date.now().toString());
  }
}

/* The key event — Chrome fires this when install criteria are met */
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  console.log('[PWA] beforeinstallprompt captured ✓');
  showInstallUI();
});

/* Header button */
document.getElementById('installAppBtn').addEventListener('click', triggerInstall);

/* Bottom banner install button */
document.getElementById('bannerInstallBtn')?.addEventListener('click', triggerInstall);

/* Bottom banner dismiss */
document.getElementById('bannerDismissBtn')?.addEventListener('click', () => {
  hideInstallUI();
  localStorage.setItem(DISMISS_KEY, Date.now().toString());
});

/* App installed callback */
window.addEventListener('appinstalled', () => {
  hideInstallUI();
  deferredPrompt = null;
  showToast('AMP KART installed! ✓');
  console.log('[PWA] App installed ✓');
});

/* Standalone mode — hide all install prompts */
if (isStandalone()) hideInstallUI();


</script>
