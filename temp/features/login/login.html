<div class="login-container">
    <div class="login-card">
        <div class="login-icon"><i class="fa-solid fa-shield-halved"></i></div>
        <h2>Admin Access</h2>
        <p>Secure login for QR Generation</p>

        <form id="login-form">
            <div class="input-group">
                <label>Email ID</label>
                <input type="email" id="email" placeholder="admin@example.com" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <div id="error-msg" class="hidden error-box"></div>

            <button type="submit" id="login-btn" class="primary-btn login-btn-style">
                <i class="fa-solid fa-right-to-bracket"></i> Login to Dashboard
            </button>
        </form>
    </div>
</div>
